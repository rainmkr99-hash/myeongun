<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#26221C">
<meta name="description" content="로그인 없이 기기 안에서만 계산하는 사주 운세 — 총사주·년운·월운·일운">
<title>오늘의 명운</title>
<link rel="manifest" href="./manifest.json">
<link rel="icon" href="./icon-192.png">
<link rel="apple-touch-icon" href="./icon-192.png">
<style>html,body{margin:0;padding:0;background:#F3EDDF}</style>
<script>
/* v1.1: 인앱브라우저 자동 탈출 — 카카오톡·라인·네이버(안드로이드) 스킴/파라미터 이동.
   네트워크 요청이 아니라 앱 전환 스킴이며, 해당 인앱 환경에서만 작동(오프라인 요건 예외 승인분). */
(function () {
  var ua = navigator.userAgent || "";
  var kakao = /KAKAOTALK/i.test(ua);
  var line = /\bLine\//i.test(ua);
  var naver = /NAVER\(inapp|inapp; search/i.test(ua);
  var etc = /FBAN|FBAV|Instagram|DaumApps/i.test(ua);
  function escapeUrl() {
    var here = location.href.split("#")[0];
    if (kakao) return "kakaotalk://web/openExternal?url=" + encodeURIComponent(here);
    if (line) {
      if (/[?&]openExternalBrowser=1/.test(here)) return null; // 이미 시도됨 — 재추가 방지
      return here + (here.indexOf("?") > -1 ? "&" : "?") + "openExternalBrowser=1";
    }
    if (naver && /Android/i.test(ua)) return "intent://" + location.host + location.pathname + location.search + "#Intent;scheme=https;package=com.android.chrome;end";
    return null;
  }
  function goOut() {
    var u = escapeUrl();
    if (!u) { showBanner(); return; }
    if (line) location.replace(u);
    else location.href = u;
  }
  function copyAddr() {
    var here = location.href.split("#")[0].split("?")[0];
    try {
      var ta = document.createElement("textarea");
      ta.value = here; document.body.appendChild(ta); ta.select();
      document.execCommand("copy"); document.body.removeChild(ta);
      var t = document.getElementById("inapp-copy"); if (t) t.textContent = "복사됨!";
    } catch (e) {}
  }
  function showBanner() {
    if (document.getElementById("inapp-banner")) return;
    var make = function () {
      if (document.getElementById("inapp-banner")) return;
      var b = document.createElement("div");
      b.id = "inapp-banner";
      b.style.cssText = "position:fixed;top:0;left:0;right:0;z-index:9999;background:#26221C;color:#F3EDDF;padding:14px 14px 16px;box-shadow:0 2px 10px rgba(0,0,0,.35);font-family:sans-serif";
      b.innerHTML = '<div id="inapp-msg" style="font-size:13px;line-height:1.6;margin-bottom:10px">지금은 앱 속 브라우저라 저장·설치가 제한될 수 있어요.<br>기본 브라우저로 열면 모든 기능을 쓸 수 있습니다.</div>' +
        '<button id="inapp-open" style="width:100%;height:48px;background:#B8352B;color:#fff;border:none;border-radius:6px;font-size:16px;font-weight:700">크롬(기본 브라우저)으로 열기</button>' +
        '<div style="display:flex;gap:8px;margin-top:8px"><button id="inapp-copy" style="flex:1;height:38px;background:transparent;color:#F3EDDF;border:1px solid #8A6F4D;border-radius:6px;font-size:13px">주소 복사</button>' +
        '<button id="inapp-close" style="width:38px;height:38px;background:transparent;color:#F3EDDF;border:1px solid #8A6F4D;border-radius:6px;font-size:15px">×</button></div>';
      document.body.appendChild(b);
      if (!escapeUrl()) { // 자동 탈출 스킴이 없는 환경(페북·인스타·네이버 iOS 등): 복사 안내로 전환
        b.querySelector("#inapp-open").style.display = "none";
        b.querySelector("#inapp-msg").innerHTML = "이 앱 안에서는 자동으로 열 수 없어요.<br>아래 <b>주소 복사</b>를 누른 뒤, 크롬이나 사파리 주소창에 붙여넣어 주세요.";
      }
      document.getElementById("inapp-open").onclick = goOut;
      document.getElementById("inapp-copy").onclick = copyAddr;
      document.getElementById("inapp-close").onclick = function () { b.remove(); };
    };
    if (document.body) make();
    else document.addEventListener("DOMContentLoaded", make);
  }
  window.__inappTest = { escapeUrl: escapeUrl, showBanner: showBanner, detected: { kakao: kakao, line: line, naver: naver, etc: etc } };
  if (!(kakao || line || naver || etc)) return; // 일반 브라우저: 아무것도 하지 않음
  if (line && /[?&]openExternalBrowser=1/.test(location.search)) { showBanner(); return; } // 라인 재귀 방지
  goOut();
  setTimeout(function () { if (!document.hidden) showBanner(); }, 1200); // 1.2초 내 탈출 실패 시 폴백
})();
</script>
</head>

<div id="root"></div>
<script>
/* 저장소: 이 기기의 localStorage만 사용 — 서버·계정 없음 */
window.storage = {
  get: async (k) => ({ value: localStorage.getItem(k) }),
  set: async (k, v) => { localStorage.setItem(k, v); },
};
</script>

function analyzeYear(prof, y, m, d) {
  const p = getPillars(y, m, d, 12, 0, {
    noTime: true
  });
  const Y = sajuYearOf(y, p.yearP);
  const dwUsed = dwForYear(prof.dw, prof.birthYear, Y);
  const ev = evaluateLuck("year", p.yearP, prof, {
    dwP: dwUsed,
    label: "세운"
  });
  const yd = yearDist(prof);
  let g = 0;
  for (const s of yd.sorted) if (s - ev.score > 1e-9) g++;
  const total = yd.sorted.length;
  const rank = Math.min(g + 1, total); // 분포 밖 나이(5세 미만·95세 초과) 조회 시에도 91등을 넘지 않게
  const topPct = Math.min(100, Math.max(1, Math.round(rank / total * 100))); // 상위 % = 순위/전체
  const yearProfile = buildYearProfile(prof, Y, ev);
  ev.events.sort((a, b) => b.w - a.w);
  return {
    ...ev,
    grade: null,
    pct: null,
    position: {
      rank,
      topPct,
      total
    },
    yearProfile,
    sajuYear: Y,
    dwUsed
  };
}

  "gyeok": {

    "중화": "어느 쪽으로도 크게 치우치지 않아 완급 조절이 되는 그릇입니다. 사람 사이에서는 양쪽 말이 다 들리는 편이라 갈등 자리에서 다리를 놓는 역할이 자연히 오고, 일은 무리 없이 꾸준한 속도로 끌고 가는 편입니다. 다만 균형이 지나치면 어느 쪽도 아닌 채 결정만 늦어지기 쉬우니, 기한을 정해 놓고 고르는 습관이 이 그릇의 보완입니다."

function overlayCat(cat, a, baseC) {
  for (const e of a.events.slice(0, 3)) {
    for (const o of OVERLAY_LIB) {
      if (!o.match.test(e.t)) continue;
      const set = e.sc > 0 ? o.pos : e.sc < 0 ? o.neg : o.neg || o.pos;
      const clause = set && set[cat];
      if (!clause) continue;
      // 방향 충돌 차단: 기본문이 '미루기'인데 긍정 절이 '오늘 하라'면 붙이지 않음
      if (set === o.pos && /묵혔|묵혀|미루|내일/.test(baseC) && /오늘/.test(clause)) continue;
      // 중복 차단: 기본문과 사실상 같은 행동이면 붙이지 않음
      if (isDupCon(baseC, clause)) continue;
      const conn = set === o.pos ? " 그리고 — " : " 다만 — ";
      return `${baseC}${conn}${clause} (${e.t}).`;
    }
  }
  return baseC;
}
function composeCat(cat, a, strength) {
  const t = catText(cat, a.tgS, strength);
  return {
    d: t.d,
    c: overlayCat(cat, a, t.c)
  };
}

const CAT_FALLBACK_CON = {
  money: ["오늘 새는 지출 하나만 정해서 막으세요.", "돈 약속은 말로 두지 말고 문자로 남기세요."],
  work: ["오늘 끝낼 것 하나를 정오 전에 정하세요.", "진행 상황을 한 줄이라도 기록으로 남기세요."],
  love: ["안부 연락 하나를 먼저 건네세요.", "고맙다는 말을 오늘 한 번은 소리 내어 하세요."],
  health: ["잠드는 시간을 오늘은 한 뼘 당기세요.", "식사 후 잠깐이라도 걷고 들어오세요."]
};
function isDupCon(x, y) {
  // 원인 태그 "(…)"(중첩 괄호 포함)와 접속어는 같은 원인의 정당한 반복이므로 비교에서 제외 — 행동 문장만 대조
  const stripTag = s => {
    const t = s.replace(/\.\s*$/, "");
    const i = t.lastIndexOf(" (");
    return i > 0 && t.endsWith(")") ? t.slice(0, i) : s;
  };
  const norm = s => stripTag(s).replace(/\([^()]*\)/g, "").replace(/다만 — |그리고 — /g, "").replace(/\s+/g, " ").trim();
  x = norm(x);
  y = norm(y);
  if (x === y) return true;
  const lw = s => s.replace(/[()..·]/g, " ").trim().split(/\s+/).slice(-2).join(" ");
  if (lw(x) === lw(y)) return true;
  for (let i = 0; i + 10 <= x.length; i++) if (y.indexOf(x.slice(i, i + 10)) >= 0) return true;
  return false;
}
function composeCats(a, strength, seed, totalC) {
  // 순서: 기본 결론끼리(+총운 결론 포함) 중복 검사·폴백 → 그 위에 이벤트 오버레이
  const outs = {};
  const done = totalC ? [totalC] : [];
  for (const cat of ["money", "work", "love", "health"]) {
    const t = catText(cat, a.tgS, strength);
    let c = t.c;
    let guard = 0;
    while (done.some(p => isDupCon(p, c)) && guard < 2) {
      c = CAT_FALLBACK_CON[cat][(seed + guard) % CAT_FALLBACK_CON[cat].length];
      guard++;
    }
    done.push(c);
    outs[cat] = {
      d: t.d,
      c: overlayCat(cat, a, c)
    };
  }
  return outs;
}
function leanLabel(prof) {
  return prof.strengthLabel === "중화" ? prof.strengthPct < 0.5 ? "신약" : "신강" : prof.strengthLabel;
}

function daySeed(p) {
  return idx60(p.dayP) + 7 * p.monthP[1];
}
function monthSeed(p) {
  return idx60(p.monthP) + 5 * p.yearP[1];
}

function sceneSourceOf(a) {
  const convEv = a.events.find(e => e.conv);
  return convEv ? CONV_TG[convEv.conv] : a.tgS;
}
function samhyungOf(a) {
  return a.events.find(e => e.t.indexOf("삼형") >= 0) || null;
}

/* 일운 총운 조립: 도입(장면 극성 기준 + 등급 어긋남엔 다리 문장) + 장면(십성 소재) + 결론(지침+완충+반전)
   완충 규칙(문체 가이드 4절): 흉은 조건부화+시한부화 1문장 필수, 대흉은 시한부화 + 안심 페어링(영역 점수 기반) */
function composeDayTotal(a, prof, idx) {
  const lean = leanLabel(prof);
  const key = a.grade.key;
  const sam = samhyungOf(a);
  const srcTg = sceneSourceOf(a);
  const g5 = G5_OF[srcTg]; // 도입은 장면 소재(삼합국 환산 반영)와 같은 축을 쓴다
  const ss = (SS_LIB[srcTg] || SS_LIB[a.tgS])[lean];
  // 장면 극성: 십성군이 나를 돕는 방향인가 (억부 기준 — 소재 사전의 방향과 일치)
  const scenePol = lean === "신약" === (g5 === "비겁" || g5 === "인성") ? "p" : "n";
  let intro;
  if (key === "best") intro = INTRO_BEST[idx % INTRO_BEST.length];else if (key === "bad") intro = INTRO_WORST[idx % INTRO_WORST.length];else if (sam && sam.t.indexOf("삼형") >= 0 && a.samhyungClass === "A" && COMBO_INTRO[`${g5}|삼형`]) intro = COMBO_INTRO[`${g5}|삼형`];else if (scenePol === "n" && COMBO_INTRO[`${g5}|공망`] && a.events.some(e => e.t.indexOf("공망") >= 0)) intro = COMBO_INTRO[`${g5}|공망`];else if (key === "flat") intro = (scenePol === "n" ? INTRO_FLAT_N : INTRO_FLAT)[idx % 3];else {
    intro = INTRO_LIB[g5][scenePol][idx % 4];
    // 등급과 장면 극성이 어긋나면 다리 문장으로 잇는다 (장면 술어와 겹치지 않는 중립 표현)
    if (key === "good" && scenePol === "n") intro += " 그래도 오늘은 감당할 힘이 있는 날입니다.";else if (key === "warn" && scenePol === "p") intro += " 다만 오늘은 벌린 만큼 새기 쉬운 날입니다.";
  }
  const scene = ss ? ss.scenes[idx % ss.scenes.length] + SCENE_FRAME[idx % SCENE_FRAME.length] : "";
  const narrEv = a.events.slice(0, 3).find(e => SINSAL_NARR[e.t] && !(key === "best" && e.t === "조후(調候)")); // 대길 도입과 전제가 겹치는 조후는 제외
  const narr = narrEv ? " " + SINSAL_NARR[narrEv.t] : ""; // 무점수 신살의 총운 서사 삽입
  let guide = "";
  if (sam) guide = a.samhyungClass === "B" ? `오늘 비켜 갈 자리는 하나뿐입니다 — ${sam.act}.` : `${sam.act}.`; // 삼형 지침 최우선
  else if (ss) guide = key === "best" || key === "good" ? `${ss.do}.` : `${ss.dont}. ${ss.do}.`; // 좋은 날은 '할 것'부터
  let twist = "";
  if (key === "best" || key === "good") {
    if (key === "best") twist = " 미뤄 둔 부탁이 있다면 해가 지기 전에 꺼내세요.";
    const neg = a.events.find(e => e.sc < 0) || a.events.find(e => e.sc === 0 && /형|충|해|파|원진|귀문|백호|양인|공망/.test(e.t));
    if (neg) twist += ` 다만 오늘의 발밑은 하나 — ${neg.act}.`;
  } else if (key === "warn") {
    // 완충(조건부화+시한부화)을 금지 지침 바로 뒤에 — 금지문이 없으면 지시 대상 없는 '이 선' 표현을 피함
    const hasDont = /마세요/.test(guide);
    twist = sam ? " 그 하나만 비켜 가면 지나가는 날입니다." : hasDont ? [" 오늘 하루 이 선만 지키면 액땜으로 지나갑니다.", " 이 선만 넘지 않으면 오늘로 끝나는 바람입니다."][idx % 2] : " 오늘 하루만 무리 없이 넘기면 액땜으로 지나갑니다.";
    const pos = a.events.find(e => e.sc > 0);
    if (pos) twist += ` 그리고 열린 문도 있습니다 — ${pos.act}.`;
  } else if (key === "bad") {
    const pos = a.events.find(e => e.sc > 0);
    if (pos) twist = ` 그래도 열린 문은 있습니다 — ${pos.act}.`;else {
      const ent = AREAS.map(k => [k, a.areas[k]]).sort((x, y) => y[1] - x[1])[0];
      twist = ent[1] > 0 ? ` 대신 ${AREA_KO[ent[0]]} 쪽은 숨이 붙어 있습니다.` : [" 오늘 남은 최선의 선택은 일찍 정리하고 쉬는 것입니다.", " 오늘은 버는 날이 아니라 아끼는 날 — 일찍 쉬는 것이 남는 장사입니다."][idx % 2];
    }
    twist += [" 이것은 오늘 하루의 날씨입니다 — 내일이면 바람이 바뀝니다.", " 오늘 하루짜리 날씨입니다. 내일은 다른 바람이 붑니다."][idx % 2];
  }
  return {
    d: `${intro} ${scene}${narr}`.trim(),
    c: `${guide}${twist}`.trim()
  };
}

/* 월운 총운 조립: 달 성격 + 장면 + 지침 + 반전 단서 한 호흡 */
function composeMonthTotal(a, prof, idx) {
  const lean = leanLabel(prof);
  const key = a.grade.key; // good | flat | warn
  const intro = (MONTH_INTRO[key] || MONTH_INTRO.flat)[idx % 2];
  const srcTg = sceneSourceOf(a);
  const ss = (SS_LIB[srcTg] || SS_LIB[a.tgS])[lean];
  const scene = ss ? `${ss.scenes[idx % ss.scenes.length]} — 이 달에 자주 마주칠 그림입니다.` : "";
  const sam = samhyungOf(a);
  const guide = sam ? `${sam.act}.` : ss ? key === "good" ? `${ss.do}.` : `${ss.dont}. ${ss.do}.` : "";
  const clue = a.clue ? ` ${a.clue}` : "";
  const seal = key === "warn" ? " 그렇게 넘기면 액땜입니다." : "";
  return {
    d: `${intro} ${scene}`.trim(),
    c: `${guide}${clue}${seal}`.trim()
  };
}

/* ─── v6.6 총사주 4축 조립 — 엔진 기존 데이터(일간·오행분포·격국·신강약·급소·왕쇠·대운/세운 점수)만 문장화. 신규 판정 없음 ─── */

function seasonOf(mb) {
  return [2, 3, 4].includes(mb) ? "봄" : [5, 6, 7].includes(mb) ? "여름" : [8, 9, 10].includes(mb) ? "가을" : "겨울";
}

/* 대운 평생 서사 — yearDist(기존 세운 점수)를 대운 마디 평균으로 묶는다 */
function daewoonNarrative(prof, nowYear) {
  const yd = yearDist(prof);
  const marks = [];
  for (let i = 0; i < prof.dw.list.length; i++) {
    const d = prof.dw.list[i];
    const from = d.from.y;
    const to = i + 1 < prof.dw.list.length ? prof.dw.list[i + 1].from.y : from + 10;
    const ys2 = yd.list.filter(x => x.year >= from && x.year < to);
    if (!ys2.length) continue;
    marks.push({
      d,
      i,
      from,
      to,
      mean: ys2.reduce((s, x) => s + x.score, 0) / ys2.length
    });
  }
  const sorted = [...marks].sort((a, b) => b.mean - a.mean);
  const bestI = sorted[0].i,
    worstI = sorted[sorted.length - 1].i;
  const second = sorted[1] ? sorted[1].i : -1;
  const phraseOf = m => {
    if (m.i === bestI) return "평생에서 가장 힘이 실리는 마디";
    if (m.i === second) return "순풍이 부는 마디";
    if (m.i === worstI) return "가장 조여드는 마디 — 벌이기보다 지키는 십 년";
    const r = sorted.findIndex(x => x.i === m.i) / (sorted.length - 1);
    return r < 0.45 ? "대체로 우호적인 마디" : r > 0.65 ? "속도를 줄여 내실을 다질 마디" : "좋고 나쁨이 섞여 흐르는 마디";
  };
  const cur = marks.find(m => nowYear >= m.from && nowYear < m.to) || null;
  return {
    marks,
    phraseOf,
    cur,
    bestI,
    worstI
  };
}

/* 4축 본문 조립 — NATAL_LIB(집필 라이브러리) 주입 후 동작. 반환: {p, v, f, rx} 각 {sum, full[]} */
function natalAxes(prof, nowYear) {
  if (!NATAL_LIB) return null;
  const L = NATAL_LIB;
  const ds = prof.dayStem;
  const dayEl = STEM_EL[ds];
  const mb = prof.natal.monthP[1];
  const season = seasonOf(mb);
  const dr = DEUKRYEONG_BY_REL[((dayEl - STEM_EL[BRANCH_MAIN[mb]]) % 5 + 5) % 5];
  const srel = dr >= 0.75 ? "돕다" : dr <= 0.25 ? "시험" : "무던";
  const dist = elementDist(prof.natal);
  const total = dist.reduce((s, v) => s + v, 0);
  const ord = [0, 1, 2, 3, 4].sort((a, b) => dist[b] - dist[a]);
  const maxEl = ord[0],
    minEl = ord[4];
  const gDist = [0, 0, 0, 0, 0];
  for (let el = 0; el < 5; el++) gDist[((el - dayEl) % 5 + 5) % 5] += dist[el];
  const gOrd = [0, 1, 2, 3, 4].sort((a, b) => gDist[b] - gDist[a]);
  const strongG = SIPSEONG_GROUP[gOrd[0]],
    voidG = SIPSEONG_GROUP[gOrd[4]];
  const voidShare = gDist[gOrd[4]] / total;
  const lean = leanLabel(prof);
  const strength = prof.strengthLabel;
  const gk = gyeokguk(prof.natal);
  const ys = yongsinMapOf(prof);
  const ws = wangsoeMapOf(prof);
  const il = L.ilgan[ds];
  const seasonTxt = L.season[`${season}-${srel}`] || "";
  const first = s => (s || "").split(". ")[0].replace(/\.$/, "") + ".";
  const EJ = (el, b, nb) => el === 0 || el === 3 ? b : nb; // 오행 조사 — 木(목)·金(금)만 받침

  /* ① 성격·기질 */
  const scenes = (SS_LIB[CONV_TG[strongG]] || SS_LIB["비견"])[lean];
  const p = {
    sum: `${first(il.essence)} ${first(seasonTxt)}`,
    full: [`${il.essence} (일간 ${STEMS[ds]}·${EL_HANJA[dayEl]})`, `${seasonTxt} (${season}생 — 계절이 내 기운을 ${srel === "돕다" ? "돕는" : srel === "시험" ? "시험하는" : "무던히 두는"} 자리)`, `${il.pair1} ${il.pair2}`, `여덟 글자의 세력 지형으로 보면 ${EL_HANJA[maxEl]} 기운이 가장 짙고 ${EL_HANJA[minEl]} 기운이 옅습니다.${STEM_EL[BRANCH_MAIN[mb]] === minEl ? ` (태어난 계절로는 ${EL_HANJA[minEl]}의 때이지만, 여덟 글자 안에서 차지한 자리가 옅다는 뜻입니다.)` : ""} ${L.persona[maxEl].strong}${dist[minEl] / total < 0.1 ? " " + L.persona[minEl].lack : ""}`, `타고난 별자리(십성)로는 ${strongG}의 기운이 가장 크게 자리 잡았습니다. ${L.sipseong[strongG].mark}${voidShare < 0.08 ? " 반대로 " + voidG + "의 기운은 옅은 편인데 — " + L.sipseong[voidG].voidText : ""}`, `${STR_DESC[strength]}`, `이런 장면이 익숙할 겁니다 — ${scenes.scenes[0]}. 또는, ${scenes.scenes[1]}.`]
  };

  /* ② 타고난 그릇 */
  const g = L.gyeok[gk];
  const plusEl = ys.score.indexOf(Math.max(...ys.score));
  const minusEl = ys.score.indexOf(Math.min(...ys.score));
  const v = {
    sum: `${gk} — ${first(g.strongField)}`,
    full: [`${GYEOK_DESC[gk]} (월지 ${BRANCHES[mb]} 기준)`, `${L.vessel[strength] || L.vessel[lean]}`, `빛나는 판 — ${g.strongField}`, `소모되는 판 — ${g.weakField}`, `이 사주의 관건은 ${EL_HANJA[plusEl]} 기운을 지키고 ${EL_HANJA[minusEl]} 기운을 다스리는 일입니다. ${EL_HANJA[plusEl]}${EJ(plusEl, "은", "는")} 이 명식의 급소이자 자산(${ys.from[plusEl].join("·")})이고, ${EL_HANJA[minusEl]}${EJ(minusEl, "이", "가")} 과하게 움직이는 시기가 고비가 되기 쉽습니다(${ys.from[minusEl].join("·")}). 지금 이 사주에서 ${EL_HANJA[plusEl]}의 뿌리는 ${ws.w[plusEl] < 0.45 ? "얇은 편이라, 지키는 쪽에 공을 들일수록 좋습니다" : "살아 있는 편이라, 흔들려도 회복이 빠릅니다"}.`]
  };

  /* ③ 대운의 큰 흐름 */
  const dn = daewoonNarrative(prof, nowYear);
  const fmtM = d => `${STEMS[d.p[0]]}${BRANCHES[d.p[1]]} 만 ${d.ageY}세(${d.from.y}.${String(d.from.m).padStart(2, "0")}~)`;
  const curPhrase = dn.cur ? (() => {
    const idx = dn.marks.findIndex(m => m.i === dn.cur.i);
    const next = dn.marks[idx + 1];
    const trend = !next ? "" : next.mean > dn.cur.mean + 0.15 ? " 다음 교운은 숨통이 트이는 쪽으로의 전환입니다." : next.mean < dn.cur.mean - 0.15 ? " 다음 교운은 옷깃을 여미는 쪽으로의 전환이니, 지금 마디에서 기반을 다져 두는 편이 좋습니다." : " 다음 교운은 결이 크게 바뀌지 않는 완만한 전환입니다.";
    return `현재는 ${fmtM(dn.cur.d)} 마디 — ${dn.phraseOf(dn.cur)}에 해당합니다.${trend}`;
  })() : "";
  const f = {
    sum: dn.cur ? `현재 ${STEMS[dn.cur.d.p[0]]}${BRANCHES[dn.cur.d.p[1]]} 대운 — ${dn.phraseOf(dn.cur)}.` : "평생 대운 흐름 요약.",
    full: ["평생을 열 개의 마디로 걸으면 이렇습니다. 특정 해의 단정이 아니라, 각 십 년에 부는 바람의 방향입니다.", ...dn.marks.map(m => `${fmtM(m.d)} — ${THEME[tenGod(ds, m.d.p[0])]}의 십 년. ${dn.phraseOf(m)}.`), curPhrase].filter(Boolean)
  };

  /* ④ 이로운 기운 — 용신·조후 처방 */
  const boostEls = [0, 1, 2, 3, 4].filter(el => ys.score[el] >= 0.2).sort((a, b) => ys.score[b] - ys.score[a]).slice(0, 2);
  const shedEls = [0, 1, 2, 3, 4].filter(el => ys.score[el] <= -0.2 && dist[el] / total >= 0.15).slice(0, 1);
  const fillEl = boostEls.find(el => dist[el] / total < 0.18);
  const rx = {
    sum: boostEls.length ? `이 사주에 힘이 되는 기운은 ${boostEls.map(e => EL_HANJA[e]).join("·")}입니다. ${first((L.elrx[boostEls[0]] || {}).boost)}` : "기운이 고루 균형 잡힌 명식입니다.",
    full: [boostEls.length ? `네 가지 용신법(억부·조후·격국·통관)의 합의로 보면, 이 사주를 받쳐 주는 기운은 ${boostEls.map(e => `${EL_HANJA[e]}(${ys.from[e].join("·")})`).join(EJ(boostEls[0], "과 ", "와 "))}입니다.` : "어느 기운도 크게 모자라거나 넘치지 않는, 균형에 가까운 명식입니다.", ...boostEls.map(el => `${EL_HANJA[el]} 기운 보태기 — ${L.elrx[el].boost}${fillEl === el ? " 원국에 이 기운의 뿌리가 옅은 편이라, 채우는 습관의 효과가 특히 큽니다." : ""}`), ...shedEls.map(el => `${EL_HANJA[el]} 기운 덜어내기 — 이 사주에는 ${EL_HANJA[el]}${EJ(el, "이", "가")} 이미 넉넉해서, 더 보태기보다 덜어내는 쪽이 균형에 가깝습니다. ${L.elrx[el].shed}`), `${L.johu[season].rx} (${season}생의 조후 보정)`, "어디까지나 기운을 고르게 하는 데 도움이 되는 습관이지, 지키지 않으면 탈이 나는 금기가 아닙니다."]
  };
  return {
    p,
    v,
    f,
    rx
  };
}

/* v6.3: 년운 — 위치 서사 + 물때 프레임 + 장면 + 프로파일 */
function yearTotalText(a, prof) {
  const lean = leanLabel(prof);
  const yp = a.yearProfile,
    pos = a.position;
  const fmtM = list => list.map(g => `${g.name}(${g.tag})`).join("과 ");
  const goodRel = yp.good.every(g => g.relative);
  const badRel = yp.bad.every(g => g.relative);
  const band = pos.topPct <= 30 ? "h" : pos.topPct >= 70 ? "l" : "m";
  const frame = band === "h" ? "평생을 통틀어 물이 들어오는 몇 안 되는 해이니, 미뤄 둔 큰 일이 있다면 이 해에 걸어 볼 만합니다." : band === "l" ? "평생에 몇 번 없는 낮은 물때이니, 이 해의 성적으로 나를 판정하지 마세요 — 이기는 해가 아니라 건너는 해입니다." : "크게 밀지도 크게 막지도 않는 해이니, 벌이기보다 다듬는 쪽이 남는 해입니다.";
  const srcTg = sceneSourceOf(a);
  const ss = (SS_LIB[srcTg] || SS_LIB[a.tgS])[lean];
  const scene = ss ? ` ${ss.scenes[pos.rank % ss.scenes.length]} — 이 해에 자주 마주칠 그림입니다.` : "";
  const d = `이 해는 5세부터 95세까지 아흔한 해를 좋은 순서로 세웠을 때 ${pos.rank}번째, 상위 ${pos.topPct}%에 드는 해입니다. ${frame}${scene} 힘이 실리는 영역은 ${AREA_KO[yp.topArea]}이고, 짐이 되기 쉬운 영역은 ${AREA_KO[yp.bottomArea]}입니다.`;
  const goodPhrase = goodRel ? `뚜렷이 좋은 달은 없고, 그나마 숨통이 트이는 달은 ${fmtM(yp.good)}입니다.` : `${fmtM(yp.good)}에 일을 실으세요.`;
  const badPhrase = badRel ? `크게 꺾이는 달은 없지만 ${fmtM(yp.bad)}은 상대적으로 느슨하니 과속만 피하세요.` : `${fmtM(yp.bad)}에는 매듭을 조이세요.`;
  const c = `${ss ? ss.do + ". " : ""}달로 보면 — ${goodPhrase} ${badPhrase}`;
  return {
    d,
    c
  };
}

const css = `

.sj-prof.on .x{background:rgba(255,255,255,.22)}
.sj-form{display:grid;grid-template-columns:1fr 1fr;gap:10px}
